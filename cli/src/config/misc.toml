# The code assumes that this table exists, so don't delete it even if you remove
# all aliases from here.
[aliases]
amend = ["squash"]
b = ["bookmark"]
ci = ["commit"]
unamend = ["unsquash"]

# Disabled but overridable commands
init = [
    "util",
    "error",
    "`jj init` is not defined by default. Perhaps you meant `jj git init`?",
    "--hint",
    """You can configure `aliases.init=["git", "init"]` if you always use the Git backend.""",
    "--"
]
clone = [
    "util",
    "error",
    "`jj clone` is not defined by default. Perhaps you meant `jj git clone`?",
    "--hint",
    """You can configure `aliases.clone=["git", "clone"]` if you always use the Git backend.""",
    "--"
]

[diff.color-words]
max-inline-alternation = 3
context = 3

[diff.git]
context = 3

[git]
private-commits = "none()"
push-bookmark-prefix = "push-"
push-new-bookmarks = false
sign-on-push = false

[ui]
allow-init-native = false
always-allow-large-revsets = false
color = "auto"
default-description = ""
diff-instructions = true
graph.style = "curved"
pager = { command = ["less", "-FRX"], env = { LESSCHARSET = "utf-8" } }
paginate = "auto"
progress-indicator = true
quiet = false
log-word-wrap = false
log-synthetic-elided-nodes = true
conflict-marker-style = "diff"
# signature verification is slow, disable by default
show-cryptographic-signatures = false

[ui.movement]
edit = false

[ui.streampager]
interface = "quit-if-one-page"
wrapping = "anywhere"

[snapshot]
max-new-file-size = "1MiB"
auto-track = "all()"
auto-update-stale = false

# TODO: https://github.com/jj-vcs/jj/issues/3419 - Remove when fully deprecated.
# The behavior when this flag is set to false is experimental and may be changed
# in the future.
[split]
legacy-bookmark-behavior = true
